<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="920" height="470" fill="#fbfaf7"/>
  <text x="40" y="38" font-size="21" font-weight="bold" fill="#2b2620">Figure 3. AgriEdge training and validation accuracy</text>
  <text x="40" y="60" font-size="13.5" fill="#5c5147">MobileNet-based CNN, 38 plant-disease classes, 5 epochs (ECE 501 project data).</text>

  <!-- axes -->
  <line x1="130" y1="90" x2="130" y2="380" stroke="#8a7a66" stroke-width="1.4"/>
  <line x1="130" y1="380" x2="840" y2="380" stroke="#8a7a66" stroke-width="1.4"/>

  <!-- y gridlines and labels -->
  <g font-size="11.5" fill="#7a6f63">
    <line x1="130" y1="322" x2="840" y2="322" stroke="#e6ded2" stroke-width="1"/><text x="92" y="326">0.88</text>
    <line x1="130" y1="264" x2="840" y2="264" stroke="#e6ded2" stroke-width="1"/><text x="92" y="268">0.90</text>
    <line x1="130" y1="206" x2="840" y2="206" stroke="#e6ded2" stroke-width="1"/><text x="92" y="210">0.92</text>
    <line x1="130" y1="148" x2="840" y2="148" stroke="#e6ded2" stroke-width="1"/><text x="92" y="152">0.94</text>
    <line x1="130" y1="90" x2="840" y2="90" stroke="#e6ded2" stroke-width="1"/><text x="92" y="94">0.96</text>
  </g>
  <text x="60" y="240" font-size="13" fill="#5c5147" transform="rotate(-90 60 240)" text-anchor="middle">Accuracy</text>

  <!-- x labels (epochs) -->
  <g font-size="12" fill="#5c5147" text-anchor="middle">
    <text x="130" y="400">1</text><text x="300" y="400">2</text><text x="470" y="400">3</text><text x="640" y="400">4</text><text x="810" y="400">5</text>
  </g>
  <text x="485" y="424" font-size="13" fill="#5c5147" text-anchor="middle">Epoch</text>

  <!-- training accuracy line -->
  <polyline points="130,331.3 300,175 470,142.2 640,131.8 810,107.1" fill="none" stroke="#8a5a2b" stroke-width="2.6"/>
  <g fill="#8a5a2b">
    <circle cx="130" cy="331.3" r="4"/><circle cx="300" cy="175" r="4"/><circle cx="470" cy="142.2" r="4"/><circle cx="640" cy="131.8" r="4"/><circle cx="810" cy="107.1" r="4"/>
  </g>

  <!-- validation accuracy line -->
  <polyline points="130,234.4 300,165.1 470,161.6 640,137.8 810,123.3" fill="none" stroke="#3d6b4f" stroke-width="2.6" stroke-dasharray="6 4"/>
  <g fill="#3d6b4f">
    <circle cx="130" cy="234.4" r="4"/><circle cx="300" cy="165.1" r="4"/><circle cx="470" cy="161.6" r="4"/><circle cx="640" cy="137.8" r="4"/><circle cx="810" cy="123.3" r="4"/>
  </g>

  <!-- final value callouts -->
  <text x="810" y="98" font-size="11.5" fill="#8a5a2b" text-anchor="middle" font-weight="bold">0.954</text>
  <text x="810" y="140" font-size="11.5" fill="#3d6b4f" text-anchor="middle" font-weight="bold">0.949</text>

  <!-- legend -->
  <rect x="600" y="430" width="22" height="0" />
  <line x1="150" y1="448" x2="186" y2="448" stroke="#8a5a2b" stroke-width="2.6"/><text x="194" y="452" font-size="12.5" fill="#3a322a">Training accuracy</text>
  <line x1="360" y1="448" x2="396" y2="448" stroke="#3d6b4f" stroke-width="2.6" stroke-dasharray="6 4"/><text x="404" y="452" font-size="12.5" fill="#3a322a">Validation accuracy</text>
</svg>
